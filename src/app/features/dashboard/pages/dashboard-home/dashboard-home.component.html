<!--HEADER COMPONENT-->

<app-dashboard-header></app-dashboard-header>

<div class="dashboard-container">

  <!--TO SHOW SUMMARY CARD-->
  <div class="card-grid">
     @if (transactionsSummaryCards$ | async; as cards) {
    @for(card of cards;
    track card)
    {
         <app-summary-card
      [card]="card">
    </app-summary-card>
    }
  }
   @else {

    @for (item of [1,2,3,4,5]; track item) {
      <app-summary-card-loader></app-summary-card-loader>
    }
  }
  </div>

  <!--TO SHOW LIVE COUNTER-->
  <div class="live-counter-section">

    <app-live-counter />

  </div>
 
  <!--
  CHANNEL BREAKDOWN CHART
  TRANSACTION CHART
  RISK CHART
  -->
  <div class="channel-chart-wrapper">
    <app-channel-breakdown [channels]="(channelData$ | async) ?? []"></app-channel-breakdown>
    <app-transaction-chart [chartData]="(transactionChartData$ | async) ?? []"></app-transaction-chart>
    <app-risk-chart [riskLevels]="(riskLevelData$ | async) ?? []" [highRiskLineData]="(highRiskLineData$ | async)?? []"></app-risk-chart>
  </div>

  <div class="transaction-alert-wrapper">

    <!--TO SHOW TRANSACTION SUMMARY TABLE-->
    <div class="left">
        <!-- Left: Transactions -->
 <app-transaction-summary
    class="transactions" [transactions]="(transactionsSummary()?? {content:[],totalElements:0,pageSize:10,pageNumber:0})" (onTransactionPageChange)="updatePageFilter($event)">
  </app-transaction-summary>
    </div>

    <!--TO SHOW ALERTS-->
      <div class="right">
       <!-- Right: Alerts -->
  <app-alerts [alerts]="(alertData$ | async) ?? []"
    class="alerts">
  </app-alerts>
    </div>

 

 

</div>

</div>
